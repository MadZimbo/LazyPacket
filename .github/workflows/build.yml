name: Build macOS app

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest

    env:
      SCHEME: "LazyPacket 1"
      PROJECT: "LazyPacket.xcodeproj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -list -project "$PROJECT"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
