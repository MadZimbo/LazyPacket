name: Build macOS app

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest

    env:
      SCHEME: "LazyPacket 1"
      PROJECT: "LazyPacket.xcodeproj"
      CONFIGURATION: "Release"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -list -project "$PROJECT"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package .app
        run: |
          APP_PATH="build/Build/Products/$CONFIGURATION/LazyPacket.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Could not find built app at $APP_PATH"
            find build/Build/Products -maxdepth 2 -name "*.app" || true
            exit 1
          fi
          # Ad-hoc sign so the binary is valid on Apple Silicon (avoids the
          # misleading "app is damaged" message that unsigned binaries trigger).
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "LazyPacket.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LazyPacket-${{ github.sha }}
          path: LazyPacket.zip
          if-no-files-found: error
